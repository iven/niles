name: Fetch RSS

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (不推送到 gh-pages，固定抓取 3 条)'
        type: boolean
        required: false
        default: false

concurrency:
  group: fetch-rss
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sources: ${{ steps.read-config.outputs.sources }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read config
        id: read-config
        run: |
          echo "sources=$(jq -c '.sources' config.json)" >> $GITHUB_OUTPUT

  fetch:
    name: ${{ matrix.source.name }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        source: ${{ fromJson(needs.prepare.outputs.sources) }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: output

      - name: Process RSS feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          bun run niles "${{ matrix.source.name }}" \
            --config config.json \
            --output-dir output \
            $DRY_RUN_FLAG

      - name: Upload RSS for commit
        uses: actions/upload-artifact@v4
        with:
          name: rss-${{ matrix.source.name }}
          path: |
            output/${{ matrix.source.name }}.xml
            output/${{ matrix.source.name }}-processed.json
          retention-days: 1

  commit:
    needs: fetch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event.inputs.dry-run != 'true'
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rss-*
          merge-multiple: true
          path: .

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add *.xml *-processed.json
          git commit -m "Update RSS feeds" || exit 0
          git push
