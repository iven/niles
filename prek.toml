# Meta hooks 用于验证和调试配置本身
[[repos]]
repo = "meta"
hooks = [
  { id = "check-useless-excludes", always_run = true },
]

# 使用 prek 内置的 Rust 原生 hooks，性能更快且无需网络
[[repos]]
repo = "builtin"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-case-conflict" },
  { id = "check-executables-have-shebangs" },
  { id = "check-json", exclude = "tsconfig.json" },
  { id = "check-merge-conflict" },
  { id = "check-symlinks" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "detect-private-key" },
  { id = "end-of-file-fixer" },
  { id = "fix-byte-order-marker" },
  { id = "mixed-line-ending" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "biome-check",
    name = "biome check",
    entry = "bun run check:write",
    language = "system",
    types_or = ["ts", "tsx", "json"],
  },
  {
    id = "typecheck",
    name = "TypeScript type check",
    entry = "bun run typecheck",
    language = "system",
    types_or = ["ts", "tsx"],
    pass_filenames = false,
  },
  {
    id = "knip",
    name = "knip check",
    entry = "bun run knip",
    language = "system",
    types_or = ["ts", "tsx", "json"],
    pass_filenames = false,
  },
]
